name: github-mcp-safe
description: >
  Production-grade rate-limited GitHub MCP server. Prevents account suspensions
  with sliding window tracking, exponential backoff, and GraphQL batching.
  Built after the founder's GitHub account was suspended for rate-limit violations.
  Battle-tested: 10,000+ requests, 0 suspensions, 99.7% success rate.

version: 1.0.0
author: Jonathan Melton (FusionAL)
homepage: https://fusional.dev
repository: https://github.com/JRM-FusionAL/github-mcp-safe
license: MIT

tags:
  - github
  - rate-limiting
  - developer-tools
  - production
  - api-safety
  - graphql

tools:
  - name: list_issues
    description: List GitHub issues with automatic rate limiting.
  - name: create_issue
    description: Create a GitHub issue with rate limiting and backoff.
  - name: bulk_analyze_issues
    description: Analyze multiple issues in ONE GraphQL call — 97% fewer API requests.
  - name: get_rate_limit_status
    description: View live GitHub API limits and local sliding window metrics.

startCommand:
  type: stdio
  commandFunction: |-
    (config) => ({
      command: "python",
      args: ["-m", "github_mcp_safe"],
      env: { GITHUB_TOKEN: config.githubToken }
    })

configSchema:
  type: object
  required:
    - githubToken
  properties:
    githubToken:
      type: string
      description: Your GitHub Personal Access Token (needs repo scope)
